<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1b26;
            --card-bg: rgba(36, 40, 59, 0.4);
            --accent: #7aa2f7;
            --text-main: #cfc9c2;
            --text-dim: #565f89;
             /* This ensures the dropdown list matches the dark theme */
             #engine-select option {
            background-color: #1a1b26; /* Match your background color */
            color: #cfc9c2;            /* Match your text color */
            padding: 10px;
}
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.3s ease; }
        .link-card:hover { border-color: var(--accent); background: rgba(122, 162, 247, 0.1); transform: translateY(-3px); }
        select { appearance: none; -webkit-appearance: none; }
        .today { color: var(--accent); font-weight: bold; border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row">

    <!-- SIDEBAR (Clock, Date, Calendar) -->
    <aside class="w-full lg:w-80 p-10 flex flex-col justify-start lg:h-screen lg:fixed left-0 border-r border-white/5">
        <div class="mb-10">
            <h1 id="clock" class="text-5xl font-light mono text-white mb-2 tracking-tighter">00:00</h1>
            <p id="date" class="text-xs uppercase tracking-[0.3em] text-[#565f89] mb-8 font-semibold">Loading...</p>
            
            <!-- Calendar Container -->
            <div class="mt-10">
                <p id="month-name" class="text-[10px] mono uppercase tracking-widest text-[#7aa2f7] mb-4"></p>
                <div id="calendar-grid" class="grid grid-cols-7 gap-y-3 text-center text-[10px] mono text-[#565f89]">
                    <!-- Days injected by JS -->
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT (Categories and Search) -->
    <main class="flex-1 flex flex-col items-center justify-center p-6 lg:ml-80 min-h-screen">
        
        <!-- Categories Grid -->
        <div id="categories" class="grid grid-cols-1 sm:grid-cols-2 2xl:grid-cols-4 gap-6 w-full max-w-6xl mb-16">
            <!-- Loaded from JSON -->
        </div>

        <!-- Centered Search Bar -->
        <div class="w-full max-w-2xl px-4">
            <form id="search-form" action="https://www.google.com/search" method="GET" class="flex items-center glass rounded-2xl overflow-hidden p-2">
                <select id="engine-select" class="bg-transparent text-[#7aa2f7] mono text-[10px] uppercase px-4 outline-none cursor-pointer font-bold">
                    <option value="https://www.google.com/search">Google</option>
                    <option value="https://duckduckgo.com/">DuckDuckGo</option>
                    <option value="https://search.brave.com/search">Brave</option>
                </select>
                <div class="w-[1px] h-6 bg-white/10 mx-2"></div>
                <input type="text" name="q" placeholder="Search the web..." autocomplete="off"
                    class="bg-transparent flex-1 py-3 px-4 outline-none text-white placeholder-[#565f89] text-sm mono">
            </form>
        </div>
        
        <!-- Quote Section -->
<div class="w-full max-w-2xl px-4 mt-16">
    <div class="glass p-6 rounded-2xl text-center">
        <p id="quote-text" class="text-sm text-[#a9b1d6] mono italic mb-4">
            Loading quote...
        </p>
        <p id="quote-author" class="text-xs text-[#565f89] mono uppercase tracking-wider">
            — Loading
        </p>
    </div>
</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
